name: Clean Workflow Runs

on:
  schedule:
    - cron: '0 0 * * *'    # 每天凌晨 0 点自动运行一次清理
  workflow_dispatch:       # 允许手动触发清理

jobs:
  clean-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write       # 必须具备 Action 删除权限
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3          # 保留最近 3 天的记录
          keep_minimum_runs: 6    # 每个工作流最少保留 6 次记录（防止全部清空）
