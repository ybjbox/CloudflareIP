name: 自动清理运行记录

on:
  schedule:
    - cron: '0 0 * * *'    # 每天凌晨 0 点自动运行一次清理
  workflow_dispatch:       # 允许手动触发清理

jobs:
  clean-runs:
    name: 自动清理运行记录任务
    runs-on: ubuntu-latest
    permissions:
      actions: write       # 必须具备 Action 删除权限
    steps:
      - name: 删除历史运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0          # 保留最近 0 天（全清，由下面的最少保留数接管）
          keep_minimum_runs: 20   # 每个工作流最少/刚好保留最新的 20 次历史
